

{% extends 'base.html' %}
{% load custom_filters %}

{% block content %}


<div class="container">
  <div class="card shadow-lg border-0">
      <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Add Consulation Bill</h4>
      </div>
      <div class="card-body">        

          <form method="post" novalidate>
              {% csrf_token %}

              <div class="row">
                  {% for field in form %}
                      <div class="col-md-3 mb-3">
                          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                          {{ field|add_class:"form-control" }}
                          {% if field.errors %}
                              <div class="text-danger small mt-1">
                                  {{ field.errors|striptags }}
                              </div>
                          {% endif %}
                      </div>
                  {% endfor %}
              </div>

              <div class="d-flex justify-content-between mt-4">                 
                  <button type="submit" class="btn btn-success">
                      Add  Consultation Bill
                  </button>
                  <a href="{% url 'billing:invoice_detail' invoice.id %}" class="btn btn-secondary">Cancel</a>
              </div>

          </form>
      </div>
  </div>
</div>





<script>
$(document).ready(function(){
    // When the doctor field changes
    $("#id_doctor").change(function(){
        var doctor_id = $(this).val();
        if (doctor_id) {
            $.ajax({
                url: "{% url 'billing:get_consultation_fee' %}",
                data: {
                    'doctor_id': doctor_id
                },
                success: function(data) {
                    // Set the consultation_fee field value
                    $("#id_consultation_fee").val(data.fee);
                }
            });
        } else {
            $("#id_consultation_fee").val('');
        }
    });
});
</script>

{% endblock %}
