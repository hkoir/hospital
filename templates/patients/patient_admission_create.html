{% extends 'base.html' %}
{% load custom_filters %}
{% load static %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">New Patient Admission</h4>
        </div>
        <div class="card-body">
	 <form method="POST" enctype="multipart/form-data" class="needs-validation p-4" novalidate>
            {% csrf_token %}
               
                {% for field in form %}
                    <div class="d-flex align-items-center mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label me-2" style="width: 150px;">
                            {{ field.label }}
                        </label>
                        {{ field|add_class:"form-control" }}
                    </div>
                {% endfor %}
            <!-- Action Buttons -->
            <div class="d-flex justify-content-between mt-4">
              <a href="{% url 'patients:patient_admission_list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left-circle"></i> Back
              </a>
              <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Create Admission
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
