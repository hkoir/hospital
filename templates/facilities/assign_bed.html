{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2>Assign Bed for {{ admission.patient.name }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      {{ form.bed.label_tag }}
      {{ form.bed }}
    </div>
    <button class="btn btn-primary">Assign Bed</button>
    <a href="{% url 'facilities:admission_detail' admission.id %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
